version: 2

models:
  - name: int_mko_products
    description: >
      MKO products normalised to the canonical product shape.
      Adds supplier='mko'. One row per product.

  - name: int_mko_variants
    description: >
      MKO variants normalised to canonical shape.
      Contract: (1) adds supplier='mko', (2) renames to canonical column names (variant_id, image_url),
      (3) computes is_available from product-level stock (MKO has no variant-level availability).
      attribute_json is NULL — MKO has no variant-level attributes.
      One row per variant.

  - name: int_mko_prices
    description: >
      MKO price tiers normalised to canonical shape.
      Adds supplier='mko'. One row per product/tier.

  - name: int_mko_stock
    description: >
      MKO stock levels normalised to canonical shape.
      Adds supplier='mko'. One row per product/warehouse.

  - name: int_mko_print_options
    description: >
      MKO print options normalised to canonical shape.
      Adds supplier='mko'. One row per product/technique/area.

  - name: int_mko_print_prices
    description: >
      MKO print technique prices normalised to canonical schema.
      amount_under (exclusive upper bound) converted to (quantity_min, quantity_max) pairs.
      product_ref, color_count, area_min_mm2, area_max_mm2 are NULL — MKO pricing is global.
      One row per technique/position/tier.
