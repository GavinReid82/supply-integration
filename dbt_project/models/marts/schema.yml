version: 2

models:
  - name: catalog
    description: >
      One row per supplier + product. Canonical product mart unioning all suppliers.
      Grain: (supplier, product_ref).
    columns:
      - name: supplier
        tests:
          - not_null
      - name: product_ref
        tests:
          - not_null

  - name: variants
    description: >
      One row per supplier + product + variant. Canonical variant mart unioning all suppliers.
      Grain: (supplier, product_ref, variant_id) — the same variant_id can appear under
      multiple products (MKO shares matnr across product groups).
    columns:
      - name: variant_id
        tests:
          - not_null

  - name: print_options
    description: >
      One row per supplier + product + technique + area. Canonical print options mart.
      Grain: (supplier, product_ref, teccode, areacode). print_color is a derived
      attribute of the technique and is not part of the key.
      Note: data is currently at product level; future goal is variant_id granularity.
    columns:
      - name: supplier
        tests:
          - not_null
      - name: product_ref
        tests:
          - not_null
      - name: teccode
        tests:
          - not_null
      - name: areacode
        tests:
          - not_null

  - name: mko_catalog
    description: >
      One row per Makito product. Joins product details, pricing, and stock.
      This is the primary table consumed by the Streamlit UI.
    columns:
      - name: product_ref
        description: Makito product reference — primary key.
        tests:
          - not_null
          - unique
      - name: min_unit_price
        description: Lowest unit price across all quantity tiers.
      - name: total_stock_qty
        description: Sum of stock across all warehouses.
      - name: in_stock_now
        description: True if any warehouse shows immediate availability.

  - name: mko_print_options
    description: One row per product / technique / area. Used by the order configurator to show available print options.
    columns:
      - name: product_ref
        tests:
          - not_null
      - name: teccode
        tests:
          - not_null

  - name: mko_print_prices
    description: One row per print technique per quantity tier. Used by the order configurator to calculate print costs.
    columns:
      - name: technique_code
        tests:
          - not_null
      - name: quantity_min
        tests:
          - not_null
      - name: price_per_unit
        tests:
          - not_null
